spring.application.name=bankflow
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/bankflow
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=BankFlowSecretKey2024BankFlowSecretKey2024
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bankflow-group
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Admin
spring.kafka.admin.auto-create=true

# Kafka Topics
bf.kafka.topic.transaction-events=bf.transaction.status.topic

# Kafka Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Kafka Consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka Admin - don't fail if topic creation fails
spring.kafka.admin.fail-fast=false

# BF Queue names
bf.rabbitmq.exchange=bf.exchange
bf.rabbitmq.queue.transaction=bf.transaction.queue
bf.rabbitmq.routing.key.transaction=bf.transaction.routing.key

# Don't fail on Kafka connection at startup
spring.kafka.listener.missing-topics-fatal=false

# Don't fail on RabbitMQ connection at startup
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AWS S3
aws.s3.bucket-name=bankflow-documents
aws.s3.region=ap-south-1
aws.access-key-id=${AWS_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}

# Logging
logging.level.com.balu=DEBUG

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.transactionService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.transactionService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.transactionService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.transactionService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.transactionService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.transactionService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.transactionService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.transactionService.eventConsumerBufferSize=10

# Resilience4j Retry
resilience4j.retry.instances.transactionService.maxAttempts=3
resilience4j.retry.instances.transactionService.waitDuration=1s

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.transactionService.limitForPeriod=10
resilience4j.ratelimiter.instances.transactionService.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.transactionService.timeoutDuration=0s

# Actuator
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true